# Fly.io config for the toolkit-skills backend.
# Docs: https://fly.io/docs/reference/configuration/

app = "toolkit-skills-backend"
primary_region = "nrt"  # Tokyo — closest Fly region to China

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[http_service.concurrency]
  type = "requests"
  hard_limit = 250
  soft_limit = 200

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/api/health"
